name: CI/CD Pipeline Spring-Angular

on:
  push:
    [cite_start]branches: [ main ] # Déclencheur sur la branche main [cite: 36]

jobs:
  build-push-test:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupération du code [cite: 37]
      - name: Checkout code
        uses: actions/checkout@v3

      # Étape 2 : Connexion à Docker Hub [cite: 44]
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build et Push Backend [cite: 45, 47]
      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      # Build et Push Frontend [cite: 46, 47]
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # Étape 3 : Test de l'application avec Docker Compose [cite: 49]
      - name: Test Application with Docker Compose
        run: |
          docker-compose up -d # Lancement en arrière-plan [cite: 50]
          sleep 30 # Attente du démarrage des services
          docker ps # Vérification des conteneurs [cite: 51, 52]
