name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    # Install Java
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    # Build Spring Boot jar
    - name: Build backend with Maven
      run: |
        cd springboot/app
        mvn clean package -DskipTests
    # Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Build backend image
    - name: Build backend image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot/app

    # Build frontend image
    - name: Build frontend image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

    # Push backend image
    - name: Push backend image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

    # Push frontend image
    - name: Push frontend image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

    # Run docker compose
    - name: Run Docker Compose
      run: docker compose up -d
