services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: demo
      MYSQL_ROOT_USERNAME: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - demo:/var/lib/mysql

  backend:
    build: ./springboot/app
    ports:
      - '8081:8081'
    depends_on:
      - mysql

  frontend:
    build: ./angular-app
    ports:
      - '4200:80'
    depends_on:
      - backend

volumes:
  demo: